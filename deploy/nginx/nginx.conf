worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  include /etc/nginx/conf.d/*.conf;

  # Gzip Compression - Rất quan trọng để tối ưu SPA (giảm dung lượng file JS/CSS/JSON)
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6; # Mức nén 6 là sự cân bằng tốt giữa CPU và hiệu quả nén
  gzip_min_length 1024; # Chỉ nén các file có dung lượng > 1KB
  gzip_types 
    text/plain 
    text/css 
    text/xml 
    text/x-component 
    application/json 
    application/javascript 
    application/rss+xml 
    application/atom+xml 
    image/svg+xml;
}
