services:
  mongodb:
    image: mongo:7-jammy
    container_name: tarot-mongodb
    command: mongod --quiet
    ports:
      - "${MONGO_PORT:?MONGO_PORT is required}:27017"
    volumes:
      - tarotnowai_mongo_data:/data/db
      - ./database/mongodb/init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    restart: always

  postgres:
    image: postgres:17-alpine
    container_name: tarot-postgres
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - tarotnowai_postgres_data:/var/lib/postgresql/data
      - ./database/postgresql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: always

  redis:
    image: redis:7-alpine
    container_name: tarot-redis
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    volumes:
      - tarotnowai_redis_data:/data
    restart: always

volumes:
  tarotnowai_mongo_data:
    external: true
  tarotnowai_postgres_data:
    external: true
  tarotnowai_redis_data:
    external: true

networks:
  default:
    name: tarotnowai_default
    external: true
