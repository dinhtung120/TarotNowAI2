name: Release Gate

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

jobs:
  backend-event-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REQUIRE_BACKEND_EVIDENCE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Verify backend domain-event evidence artifact
        run: npm run verify:event-evidence
