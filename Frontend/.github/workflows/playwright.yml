name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      PLAYWRIGHT_USE_PREBUILT_SERVER: "true"
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8080/api/v1
      INTERNAL_API_URL: http://127.0.0.1:8080/api/v1
      RUN_NAVIGATION_BENCHMARK: "false"
      RUN_VIEWPORT_QA: "false"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Build app
      run: npm run build
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
