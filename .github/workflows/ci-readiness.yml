name: CI Readiness

on:
  push:
    branches: [main, develop]
    paths:
      - "Backend/**"
      - "Frontend/**"
      - "database/**"
      - "deploy/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "Backend/**"
      - "Frontend/**"
      - "database/**"
      - "deploy/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      run_rollback_drill:
        description: "Run full rollback drill (N -> N+1 -> rollback to N)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-readiness-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_ENV_FILE: .ci.prod.env

jobs:
  backend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore src/TarotNow.Api/TarotNow.Api.csproj

      - name: Build
        run: dotnet build src/TarotNow.Api/TarotNow.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test TarotNow.slnx --configuration Release --nologo

  frontend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5037/api/v1
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXTAUTH_URL: http://localhost:3000
          NODE_TLS_REJECT_UNAUTHORIZED: "1"

      - name: Test
        run: npm test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5037/api/v1
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXTAUTH_URL: http://localhost:3000
          NODE_TLS_REJECT_UNAUTHORIZED: "1"

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs:
      - backend-build-test
      - frontend-build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Backend/Dockerfile -t tarotnow/backend:ci .

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:5037/api/v1 \
            --build-arg NEXT_PUBLIC_BASE_URL=http://localhost:3000 \
            --build-arg NEXTAUTH_URL=http://localhost:3000 \
            -f Frontend/Dockerfile -t tarotnow/frontend:ci .

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: tarotnow/backend:ci
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: tarotnow/frontend:ci
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"

  compose-gates:
    runs-on: ubuntu-latest
    needs: docker-build-and-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: |
          cat > "$CI_ENV_FILE" <<'ENV'
          PUBLIC_HTTP_PORT=80
          PUBLIC_BASE_URL=http://localhost
          NEXT_PUBLIC_API_URL=http://localhost/api/v1
          NEXT_ALLOWED_DEV_HOSTS=localhost
          PRIVATE_NETWORK_SUBNET=172.30.0.0/24
          FORWARDED_NETWORK_0=172.30.0.0/24
          POSTGRES_USER=tarot_user
          POSTGRES_PASSWORD=tarot_ci_password
          POSTGRES_DB=tarotweb
          MONGO_DB=tarotweb
          JWT_SECRETKEY=tarot_ci_jwt_secret_key_at_least_32_chars
          PAYMENT_WEBHOOK_SECRET=tarot_ci_webhook_secret
          MFA_ENCRYPTION_KEY=tarot_ci_mfa_encryption_key
          SMTP_HOST=smtp.example.com
          SMTP_PORT=587
          SMTP_USERNAME=smtp_user
          SMTP_PASSWORD=smtp_password
          SMTP_SENDER_EMAIL=noreply@example.com
          AI_API_KEY=test-key
          AI_BASE_URL=https://api.openai.com/v1/
          AI_MODEL=gpt-4.1-mini
          ENV

      - name: Bootstrap databases
        run: ./deploy/scripts/bootstrap-db.sh "$CI_ENV_FILE" docker-compose.prod.yml

      - name: Start app stack
        run: docker compose --env-file "$CI_ENV_FILE" -f docker-compose.prod.yml up -d --build backend frontend reverse-proxy

      - name: Smoke gate
        run: ./deploy/scripts/smoke.sh http://localhost

      - name: Failure drill gate
        run: ./deploy/scripts/failure-drills.sh http://localhost "$CI_ENV_FILE" docker-compose.prod.yml

      - name: Scale drill gate
        run: ./deploy/scripts/scale-drill.sh http://localhost "$CI_ENV_FILE" docker-compose.prod.yml 2 2

      - name: Compose logs on failure
        if: failure()
        run: docker compose --env-file "$CI_ENV_FILE" -f docker-compose.prod.yml logs --no-color

      - name: Compose down
        if: always()
        run: docker compose --env-file "$CI_ENV_FILE" -f docker-compose.prod.yml down -v

  rollback-drill:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_rollback_drill == true }}
    runs-on: ubuntu-latest
    needs: docker-build-and-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: |
          cat > "$CI_ENV_FILE" <<'ENV'
          PUBLIC_HTTP_PORT=80
          PUBLIC_BASE_URL=http://localhost
          NEXT_PUBLIC_API_URL=http://localhost/api/v1
          NEXT_ALLOWED_DEV_HOSTS=localhost
          PRIVATE_NETWORK_SUBNET=172.30.0.0/24
          FORWARDED_NETWORK_0=172.30.0.0/24
          POSTGRES_USER=tarot_user
          POSTGRES_PASSWORD=tarot_ci_password
          POSTGRES_DB=tarotweb
          MONGO_DB=tarotweb
          JWT_SECRETKEY=tarot_ci_jwt_secret_key_at_least_32_chars
          PAYMENT_WEBHOOK_SECRET=tarot_ci_webhook_secret
          MFA_ENCRYPTION_KEY=tarot_ci_mfa_encryption_key
          SMTP_HOST=smtp.example.com
          SMTP_PORT=587
          SMTP_USERNAME=smtp_user
          SMTP_PASSWORD=smtp_password
          SMTP_SENDER_EMAIL=noreply@example.com
          AI_API_KEY=test-key
          AI_BASE_URL=https://api.openai.com/v1/
          AI_MODEL=gpt-4.1-mini
          ENV

      - name: Rollback drill gate
        run: ./deploy/scripts/rollback-drill.sh "$CI_ENV_FILE" docker-compose.prod.yml http://localhost

      - name: Compose logs on failure
        if: failure()
        run: docker compose --env-file "$CI_ENV_FILE" -f docker-compose.prod.yml logs --no-color

      - name: Compose down
        if: always()
        run: docker compose --env-file "$CI_ENV_FILE" -f docker-compose.prod.yml down -v
