# =============================================================================
# TarotNow – CI Frontend Pipeline (GitHub Actions)
# =============================================================================
# Mục đích: Tự động build, typecheck, và test frontend (Next.js) mỗi khi có
# push hoặc PR vào các branch chính.
#
# Pipeline flow:
#   1. Checkout code
#   2. Setup Node.js
#   3. Cache npm dependencies (tăng tốc install)
#   4. Install dependencies (npm ci – deterministic, nhanh hơn npm install)
#   5. TypeScript type check
#   6. Lint check
#   7. Build production bundle (verify build không lỗi)
#   8. Run Playwright E2E tests (nếu có)
# =============================================================================

name: CI Frontend (Next.js)

# Trigger: chạy khi push/PR vào main hoặc develop,
# và chỉ khi có thay đổi trong thư mục Frontend/
on:
  push:
    branches: [main, develop]
    paths:
      - 'Frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Frontend/**'
      - '.github/workflows/ci-frontend.yml'

# Chỉ 1 pipeline chạy cho cùng 1 branch tại 1 thời điểm
concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Working directory mặc định là Frontend/
    defaults:
      run:
        working-directory: Frontend

    steps:
      # Bước 1: Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Setup Node.js 20 (LTS)
      # Dùng Node 20 vì Next.js 16 yêu cầu Node >= 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Bước 3: Cache npm dependencies
      # Tăng tốc pipeline bằng cách cache node_modules đã install
      # Cache key dựa trên hash của package-lock.json
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('Frontend/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # Bước 4: Install dependencies
      # npm ci: nhanh hơn npm install, sử dụng package-lock.json exact versions
      # Đảm bảo reproducible builds (mọi developer/CI cùng package versions)
      - name: Install dependencies
        run: npm ci

      # Bước 5: TypeScript type check
      # Chạy riêng typecheck trước build để fail-fast nếu có type errors
      # Giúp developer biết lỗi nhanh hơn thay vì chờ full build
      - name: TypeScript type check
        run: npx tsc --noEmit

      # Bước 6: Lint check
      # ESLint kiểm tra code style và potential bugs
      - name: Lint
        run: npm run lint

      # Bước 7: Build production bundle
      # Verify build không lỗi – bao gồm SSR compilation, asset optimization
      - name: Build
        run: npm run build

      # Bước 8: Playwright E2E tests (nếu cấu hình đã sẵn sàng)
      # Bước này chỉ chạy khi file playwright.config.ts tồn tại
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        if: hashFiles('Frontend/playwright.config.ts') != ''

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        if: hashFiles('Frontend/playwright.config.ts') != ''

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('Frontend/playwright.config.ts') != ''
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 30
