















name: CI Backend (.NET)



on:
  push:
    branches: [main, develop]
    paths:
      - 'Backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Backend/**'
      - '.github/workflows/ci-backend.yml'



concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:

    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: Backend

    steps:

      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'




      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-



      - name: Restore dependencies
        run: dotnet restore




      - name: Build
        run: dotnet build --no-restore --configuration Release





      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results




      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: Backend/test-results/
          retention-days: 30
